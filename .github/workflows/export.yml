name: Export and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  export-and-deploy:
    name: Export Godot Project
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          template_dir=$(find /root/.local/share/godot/export_templates/ -maxdepth 1 -mindepth 1 -type d | head -n 1)
          echo "Found template dir: $template_dir"
          mv "$template_dir" ~/.local/share/godot/export_templates/"$(basename "$template_dir")"

      - name: Create build directory
        run: mkdir -v -p builds/web

      - name: Export HTML5
        run: godot --headless --verbose --export-release "HTML5" builds/web/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: builds/web
          force_orphan: true
