name: Export and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export:
    name: Export Godot Project
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          template_dir=$(find /root/.local/share/godot/export_templates/ -maxdepth 1 -mindepth 1 -type d | head -n 1)
          echo "Found template dir: $template_dir"
          mv "$template_dir" ~/.local/share/godot/export_templates/"$(basename "$template_dir")"

      - name: Create build directory
        run: mkdir -v -p builds/web

      - name: Export HTML5
        run: godot --headless --verbose --export-release "HTML5" builds/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

  deploy:
    name: Deploy to GitHub Pages
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
